# ============================================================
# 合併進 VM 上的 ~/.hermes/config.yaml（對應區段合併，不要整段取代）
# ⚠️ 把 YOUR_USER 換成實際 home、YOUR_LINE_USER_ID 換成 U 開頭的 LINE user id
# ============================================================

# 1. toolsets：加入 secretary 這個 toolset
toolsets:
  - mcp-secretary

# 2. mcp_servers：加入 secretary MCP server（Node ESM，免 build）
mcp_servers:
  secretary:
    command: node
    args:
      - /home/YOUR_USER/secretary-mcp/server.mjs
    env:
      SECRETARY_LINE_USER_ID: YOUR_LINE_USER_ID                      # e.g. U196d1445f7fe156eac44c02106f364ec
      SECRETARY_LINE_CHANNEL_ACCESS_TOKEN: "${LINE_CHANNEL_ACCESS_TOKEN}"  # from system env; blank disables line_* tools
      SECRETARY_FILE_HOST_BASE_URL: "https://files.example.com"      # public URL of the file-host (no /files suffix)
      # GOOGLE_MAPS_API_KEY is intentionally NOT set here — server.mjs loads
      # it itself from a .env file next to server.mjs (see README.md
      # "環境變數"). Drop a .env there instead of exporting it system-wide.

# 3. agent：啟用 tool_use_enforcement、停用部分內建工具、調整 tool_search 門檻
agent:
  disabled_toolsets:
    - web
    - browser
    - video
    - image_gen
    - video_gen
    - x_search
    - moa
    - todo
    - context_engine
    - homeassistant
    - spotify
    - yuanbao

tools:
  tool_search:
    threshold_pct: 20
